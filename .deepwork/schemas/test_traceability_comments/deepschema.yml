summary: "TypeScript test files with formal requirement traceability comments."
instructions: |
  Use this schema to review TypeScript tests that claim to validate formal
  requirements. The goal is durable traceability without brittle comments tied
  to temporary implementation details.

  Tests that validate a formal requirement MUST have a two-line traceability
  comment immediately before the relevant `it(...)`, `test(...)`, or
  `describe(...)` block. Do not flag tests that have no requirement reference
  and are merely utility or edge-case tests without formal requirement coverage
  claims:

  ```ts
  // THIS TEST VALIDATES A HARD REQUIREMENT (APPLEPI-REQ-008.3).
  // YOU MUST NOT MODIFY THIS TEST UNLESS THE REQUIREMENT CHANGES.
  it("validates durable behavior", () => {
    // ...
  });
  ```

matchers:
  - "tests/**/*.ts"
  - "tests/**/*.tsx"
  - "**/*.test.ts"
  - "**/*.spec.ts"

requirements:
  required-two-line-traceability-comment: >
    Tests that validate a formal requirement MUST include both traceability
    comment lines: `THIS TEST VALIDATES A HARD REQUIREMENT (...)` with one or
    more requirement IDs such as `APPLEPI-REQ-NNN.M` or comma-separated IDs such
    as `APPLEPI-REQ-005.3, APPLEPI-REQ-005.6`, and `YOU MUST NOT MODIFY THIS TEST
    UNLESS THE REQUIREMENT CHANGES.`

  immediate-traceability-comment-placement: >
    The two-line traceability comment block MUST appear immediately before the
    `it(...)`, `test(...)`, or `describe(...)` block it governs.

  no-false-positive-for-unclaimed-coverage: >
    Tests without a formal requirement reference MUST NOT be flagged solely for
    lacking traceability comments when they are utility tests or edge-case tests
    that do not claim formal requirement coverage.

  durable-traceability-comments: >
    Tests that validate a formal requirement MUST include a durable traceability
    comment identifying the requirement ID and warning that the test must not be
    modified unless the requirement changes.
  valid-applepi-requirement-id: >
    Requirement traceability comments MUST reference IDs using the pattern
    `APPLEPI-REQ-NNN.M` unless the test is intentionally validating an external
    standard documented by another prefix.
  no-transient-comment-context: >
    Test comments MUST NOT rely on source line numbers, pull request numbers,
    current-diff descriptions, or other transient context that will not help a
    future maintainer.
  comments-match-behavior: >
    Test comments MUST accurately describe the behavior or policy validated by
    the test after the change.

references:
  - path: "../../../docs/validating_requirements_with_rules.md"
    description: "Traceability comment format and validation mechanism guidance."
