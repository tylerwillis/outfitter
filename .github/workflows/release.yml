name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish-npm:
    name: Publish npm package and container image
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26.4.0'
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release version
        run: node scripts/sync-release-version.mjs "${GITHUB_REF_NAME}"

      - name: Format synchronized release metadata
        run: npm exec -- prettier --write package.json package-lock.json

      - name: Run CI checks
        run: npm run check-ci

      - name: Build package
        run: npm run build

      - name: Publish package to npm
        run: npm publish --access public --provenance

      - name: Prepare container image metadata
        id: container
        run: |
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.container.outputs.image }}:${{ steps.container.outputs.version }}
            ${{ steps.container.outputs.image }}:latest
